server.port=${PORT:8081}
spring.application.name=streaming



spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8
server.servlet.context-path=/streaming

spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/


# Admin credentials — sobreescribir con variables de entorno en produccion
app.admin.user=${ADMIN_USER:admin}
app.admin.pass=${ADMIN_PASS:streaming2025}

# Proxy HTTP para que el servidor llegue al proveedor IPTV
# Dejar vacio si hay conexion directa a internet
app.iptv.proxy.host=
app.iptv.proxy.port=3128
# Timeouts en milisegundos
app.iptv.timeout.connect=15000
app.iptv.timeout.read=30000
