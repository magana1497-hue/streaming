<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8"/>
    <title>Streaming ISP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/x-icon" th:href="@{/dist/saas/assets/images/isp_icon.png}">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        #player {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #live-badge {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            background: #dc3545;
            color: #fff;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 10;
        }

        .blink-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            margin-right: 4px;
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        #waiting-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d14;
        }

        #status-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; }
        #status-text { color: #aaa; font-size: 1rem; }
    </style>
</head>
<body>

<span id="live-badge"><span class="blink-dot"></span>EN VIVO</span>

<div id="waiting-screen">
    <span id="status-icon">📡</span>
    <p id="status-text">Esperando transmisión&hellip;</p>
</div>

<!-- Tap-to-play / tap-to-fullscreen overlay -->
<div id="tap-overlay" style="display:none; position:fixed; inset:0; z-index:15;
     background:rgba(0,0,0,0.55); cursor:pointer;
     flex-direction:column; align-items:center; justify-content:center; gap:12px;">
    <div style="font-size:4.5rem; line-height:1;">▶</div>
    <p style="color:#fff; font-size:1.1rem; font-weight:600; margin:0;">Toca para reproducir</p>
    <p style="color:#aaa; font-size:0.82rem; margin:0;">Se abrirá en pantalla completa</p>
</div>

<!-- Fullscreen button (esquina inferior derecha) -->
<button id="btn-fullscreen" title="Pantalla completa"
        style="display:none; position:fixed; bottom:16px; right:16px; z-index:20;
               background:rgba(0,0,0,0.55); border:none; border-radius:8px;
               color:#fff; font-size:1.4rem; padding:8px 10px; cursor:pointer;
               backdrop-filter:blur(4px); line-height:1;">⛶</button>

<video id="player" playsinline></video>

<!-- Config for JS -->
<span id="ws-config" th:data-ws-url="@{/ws/signal}" style="display:none"></span>

<script th:src="@{/js/hls.min.js}"></script>
<script th:src="@{/js/viewer.js}"></script>
</body>
</html>
